name: Windows Multi-Arch Build

on:
  workflow_dispatch:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CMAKE_BASE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_NATIVE=OFF"
  VULKAN_VERSION: 1.4.313.2

jobs:
  windows-x86_64:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_defines: '-G "Ninja Multi-Config" -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON'
            artifact_suffix: windows-x64-cpu
          - name: vulkan
            cmake_defines: '-G "Ninja Multi-Config" -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake -DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON -DGGML_VULKAN=ON'
            artifact_suffix: windows-x64-vulkan
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: choco install ninja

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: |
          curl.exe -o $env:RUNNER_TEMP\VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-${{ matrix.backend.artifact_suffix }}
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

      - run: cmake -S . -B build ${{ matrix.backend.cmake_defines }} ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j ${env:NUMBER_OF_PROCESSORS}

      - run: |
          cp LICENSE ./build/bin/Release/
          7z a turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip .\build\bin\Release\*

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip

  windows-arm64:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_flags: ""
            artifact_suffix: windows-arm64-cpu
          - name: vulkan
            cmake_flags: "-DGGML_VULKAN=ON"
            artifact_suffix: windows-arm64-vulkan
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: choco install ninja

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: |
          curl.exe -o $env:RUNNER_TEMP\VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/1.4.350.0/warm/vulkansdk-windows-ARM64-1.4.350.0.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\1.4.350.0"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\1.4.350.0\bin"

      - uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-${{ matrix.backend.artifact_suffix }}
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

      - run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            -D CMAKE_TOOLCHAIN_FILE=cmake/arm64-windows-llvm.cmake `
            -DGGML_NATIVE=OFF `
            ${{ matrix.backend.cmake_flags }} `
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j ${env:NUMBER_OF_PROCESSORS}

      - run: |
          cp LICENSE ./build/bin/Release/
          7z a turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip .\build\bin\Release\*

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip

  windows-x86:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_flags: ""
            artifact_suffix: windows-x86-cpu
          - name: vulkan
            cmake_flags: "-DGGML_VULKAN=ON"
            artifact_suffix: windows-x86-vulkan
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: choco install ninja

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: |
          curl.exe -o $env:RUNNER_TEMP\VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - run: |
          mkdir -Force cmake
          @'
          set( CMAKE_SYSTEM_NAME Windows )
          set( CMAKE_SYSTEM_PROCESSOR x86 )
          set( CMAKE_C_COMPILER clang )
          set( CMAKE_CXX_COMPILER clang++ )
          set( CMAKE_C_COMPILER_TARGET i686-pc-windows-msvc )
          set( CMAKE_CXX_COMPILER_TARGET i686-pc-windows-msvc )
          '@ | Out-File -Encoding ASCII cmake/x86-windows-llvm.cmake

      - uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-${{ matrix.backend.artifact_suffix }}
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

      - run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            -D CMAKE_TOOLCHAIN_FILE=cmake/x86-windows-llvm.cmake `
            -DGGML_NATIVE=OFF `
            ${{ matrix.backend.cmake_flags }} `
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j ${env:NUMBER_OF_PROCESSORS}

      - run: |
          cp LICENSE ./build/bin/Release/
          7z a turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip .\build\bin\Release\*

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.zip
