name: Linux Multi-Arch Build

on:
  workflow_dispatch:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CMAKE_BASE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_NATIVE=OFF"

jobs:
  linux-x86_64:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_flags: "-DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON"
            artifact_suffix: linux-x64-cpu
          - name: vulkan
            cmake_flags: "-DGGML_BACKEND_DL=ON -DGGML_CPU_ALL_VARIANTS=ON -DGGML_VULKAN=ON"
            artifact_suffix: linux-x64-vulkan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - if: ${{ matrix.backend.name == 'cpu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y build-essential mesa-vulkan-drivers vulkan-sdk libssl-dev

      - uses: ggml-org/ccache-action@v1.2.21
        with:
          key: linux-${{ matrix.backend.artifact_suffix }}
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            ${{ matrix.backend.cmake_flags }} \
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j $(nproc)

      - run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ github.ref_name }}," -C ./build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz

  linux-arm64:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_flags: ""
            artifact_suffix: linux-arm64-cpu
          - name: vulkan
            cmake_flags: "-DGGML_VULKAN=ON"
            artifact_suffix: linux-arm64-vulkan
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 build-essential libssl-dev ninja-build
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: sudo apt-get install -y glslc libvulkan-dev spirv-headers

      - uses: ggml-org/ccache-action@v1.2.21
        with:
          key: linux-${{ matrix.backend.artifact_suffix }}
          variant: ccache
          evict-old-files: 1d
          save: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}

      - run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            ${{ matrix.backend.cmake_flags }} \
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build -j $(nproc)

      - run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ github.ref_name }}," -C ./build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz

  linux-x86:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib g++-multilib

      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-m32 -march=i686 -mno-bmi2 -mno-avx2 -mno-avx -mno-sse4.2 -mno-fma -mno-f16c" \
            -DCMAKE_CXX_FLAGS="-m32 -march=i686 -mno-bmi2 -mno-avx2 -mno-avx -mno-sse4.2 -mno-fma -mno-f16c" \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_BMI2=OFF \
            -DGGML_AVX2=OFF \
            -DGGML_AVX=OFF \
            -DGGML_SSE42=OFF \
            -DGGML_FMA=OFF \
            -DGGML_F16C=OFF \
            -DLLAMA_OPENSSL=OFF \
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j $(nproc)

      - run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ github.ref_name }}-linux-x86-cpu.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ github.ref_name }}," -C ./build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: linux-x86-cpu
          path: turboquant-plus-${{ github.ref_name }}-linux-x86-cpu.tar.gz

  linux-arm32:
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: cpu
            cmake_flags: "-DGGML_OPENMP=OFF"
            artifact_suffix: linux-arm32-cpu
          - name: vulkan
            cmake_flags: "-DGGML_VULKAN=ON -DGGML_OPENMP=OFF"
            artifact_suffix: linux-arm32-vulkan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheTom/llama-cpp-turboquant
          ref: feature/turboquant-kv-cache
          fetch-depth: 0

      - run: |
          sudo dpkg --add-architecture armhf
          cat << EOF | sudo tee /etc/apt/sources.list.d/armhf-ports.list
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ jammy main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main universe
          EOF
          sudo apt-get update || true

      - run: |
          sudo apt-get install -y build-essential gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libssl-dev:armhf

      - if: ${{ matrix.backend.name == 'vulkan' }}
        run: sudo apt-get install -y glslang-tools libvulkan-dev:armhf spirv-headers

      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_FIND_ROOT_PATH=/usr/lib/arm-linux-gnueabihf \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DLLAMA_OPENSSL=OFF \
            ${{ matrix.backend.cmake_flags }} \
            ${{ env.CMAKE_BASE_ARGS }}

      - run: cmake --build build --config Release -j $(nproc)

      - run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ github.ref_name }}," -C ./build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend.artifact_suffix }}
          path: turboquant-plus-${{ github.ref_name }}-${{ matrix.backend.artifact_suffix }}.tar.gz
